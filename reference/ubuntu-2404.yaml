# =============================================================================
# reference/ubuntu-2404.yaml  —  golden image (source-derived)
# Layer: child of base  |  Debian/Ubuntu Ubuntu 24.04 LTS (Noble)
# Généré depuis docs/storage-standards (recherche sourcée). Tailles en OCTETS
# (interprétation de la chaîne source conservée dans size_source).
# À VÉRIFIER contre les sources citées (section 'sources') avant de figer.
# =============================================================================
model_id: ubuntu-2404
parent: base
os_family: "Debian/Ubuntu"
os_distribution: ["Ubuntu"]
os_version: "Ubuntu 24.04 LTS (Noble)"
default_fstype: "ext4"
swap_guidance: "Ubuntu 24.04 LTS: For systems with hibernation, swap must be at least RAM size. For systems without hibernation: min=round(sqrt(RAM)), max=2xRAM. Ubuntu 24.04 supports zram (compressed in-memory swap) via zram-tools package, which can compress data 2-3x. zram prevents hibernation; use zswap if sleep-to-disk is needed. Modern systems with >8GB RAM can use smaller swap or zram only."
notes: "Ubuntu 24.04 LTS (Noble Numbat) released April 2024, latest LTS with 5-year standard support (until 2029). Introduces zram support for memory-constrained systems. CIS Benchmark v1.0.0 and v2.0.0 available. Can use LVM for flexible storage management."
expected_filesystems:
  - mount_point: "/"
    classification: "system"
    requirement: "mandatory"
    mandatory: true
    separate_filesystem_required: "yes"
    expected_fstype: "ext4"
    min_size_bytes: 8589934592
    max_size_bytes: null
    size_source: {min: "8 GiB", max: "unbounded"}
    expected_mount_options: "defaults"
    source_id: ["ubuntu-system-requirements"]
    notes: "Root filesystem. Minimum 8GB, recommended 15GB. Ubuntu 24.04 Server requires minimum 5GB (ISO install), Desktop requires 25GB."
  - mount_point: "/boot"
    classification: "boot"
    requirement: "recommended"
    mandatory: false
    separate_filesystem_required: "conditional"
    expected_fstype: "ext4"
    min_size_bytes: 268435456
    max_size_bytes: 1073741824
    size_source: {min: "256 MiB", max: "1 GiB"}
    expected_mount_options: "defaults,nosuid,nodev"
    source_id: ["ubuntu-partitioning"]
    notes: "Boot loader files. Separate partition recommended on GPT/UEFI systems."
  - mount_point: "/boot/efi"
    classification: "boot"
    requirement: "conditional"
    mandatory: false
    separate_filesystem_required: "yes"
    expected_fstype: "vfat"
    min_size_bytes: 209715200
    max_size_bytes: 1073741824
    size_source: {min: "200 MiB", max: "1 GiB"}
    expected_mount_options: "defaults"
    source_id: ["ubuntu-partitioning"]
    notes: "EFI System Partition (ESP) for UEFI systems. Created automatically by installer in UEFI mode."
  - mount_point: "/home"
    classification: "data"
    requirement: "recommended"
    mandatory: false
    separate_filesystem_required: "yes"
    expected_fstype: "ext4"
    min_size_bytes: null
    max_size_bytes: null
    size_source: {min: "unbounded", max: "unbounded"}
    expected_mount_options: "defaults,nosuid,nodev"
    source_id: ["ubuntu-partitioning", "cis-ubuntu-24"]
    notes: "User home directories. Recommended for multi-user systems. CIS Benchmark for Ubuntu 24.04 recommends nosuid,nodev mount options."
  - mount_point: "/usr"
    classification: "system"
    requirement: "optional"
    mandatory: false
    separate_filesystem_required: "conditional"
    expected_fstype: "ext4"
    min_size_bytes: 10737418240
    max_size_bytes: null
    size_source: {min: "10 GiB", max: "unbounded"}
    expected_mount_options: "defaults"
    source_id: ["ubuntu-disk-space"]
    notes: "User programs and data. Can be mounted read-only if separate filesystem."
  - mount_point: "/var"
    classification: "data"
    requirement: "recommended"
    mandatory: false
    separate_filesystem_required: "yes"
    expected_fstype: "ext4"
    min_size_bytes: 2147483648
    max_size_bytes: null
    size_source: {min: "2 GiB", max: "unbounded"}
    expected_mount_options: "defaults,nosuid,nodev"
    source_id: ["ubuntu-disk-space", "cis-ubuntu-24"]
    notes: "Variable data. Ubuntu recommends 2GB minimum for separate /var. CIS Benchmark recommends nosuid,nodev."
  - mount_point: "/var/log"
    classification: "data"
    requirement: "recommended"
    mandatory: false
    separate_filesystem_required: "conditional"
    expected_fstype: "ext4"
    min_size_bytes: 104857600
    max_size_bytes: null
    size_source: {min: "100 MiB", max: "unbounded"}
    expected_mount_options: "defaults,nodev,nosuid,noexec"
    source_id: ["cis-ubuntu-24"]
    notes: "System log files. CIS Benchmark for Ubuntu 24.04 requires separate partition with nodev,nosuid,noexec mount options."
  - mount_point: "/var/tmp"
    classification: "data"
    requirement: "recommended"
    mandatory: false
    separate_filesystem_required: "conditional"
    expected_fstype: "ext4"
    min_size_bytes: 104857600
    max_size_bytes: null
    size_source: {min: "100 MiB", max: "unbounded"}
    expected_mount_options: "defaults,nodev,nosuid,noexec"
    source_id: ["cis-ubuntu-24"]
    notes: "Temporary files preserved between reboots. CIS Benchmark requires separate partition with nodev,nosuid,noexec mount options."
  - mount_point: "/tmp"
    classification: "data"
    requirement: "recommended"
    mandatory: false
    separate_filesystem_required: "yes"
    expected_fstype: "ext4"
    min_size_bytes: 524288000
    max_size_bytes: 2147483648
    size_source: {min: "500 MiB", max: "2 GiB"}
    expected_mount_options: "defaults,nodev,nosuid,noexec"
    source_id: ["cis-ubuntu-24"]
    notes: "Temporary files. CIS Benchmark requires separate partition with nodev,nosuid,noexec mount options."
  - mount_point: "/dev/shm"
    classification: "data"
    requirement: "optional"
    mandatory: false
    separate_filesystem_required: "no"
    expected_fstype: "tmpfs"
    min_size_bytes: null
    max_size_bytes: null
    size_source: {min: "N/A", max: "N/A"}
    expected_mount_options: "defaults,nodev,nosuid,noexec"
    source_id: ["cis-ubuntu-24"]
    notes: "Shared memory filesystem (tmpfs). CIS Benchmark recommends mounting with nodev,nosuid,noexec options."
  - mount_point: "swap"
    classification: "swap"
    requirement: "mandatory"
    mandatory: true
    separate_filesystem_required: "yes"
    expected_fstype: "swap"
    min_size_bytes: 1073741824
    max_size_bytes: null
    size_source: {min: "1 GiB", max: "2x RAM"}
    expected_mount_options: "defaults"
    source_id: ["ubuntu-swap-faq"]
    notes: "Swap space or zram. Ubuntu 24.04 supports zram for compressed in-memory swap. Traditional swap partition or swapfile also supported."
